<!DOCTYPE html>
<html lang="en">
<head>

   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>catfries production company.</title>
    <style>
        /* hey random looker, i know this code is ai, i dont condone it,
        but i do not have any knowledge of html, and this is the only way.
        sorry.  i dont condone it. */
        /* --- ROBLOX DEVFORUM THEME --- */
        :root {
            --bg-body: #111216;       /* Main dark background */
            --bg-card: #22252a;       /* Header/Item background */
            --text-main: #ffffff;     /* Bright text */
            --text-dim: #909090;      /* Gray text */
            --accent: #00a2ff;        /* Roblox Studio Blue */
            --border: #33363b;        /* Separator lines */
            --tag-bg: #32353b;        /* Tag background */
            --font-stack: 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-stack);
            line-height: 1.4;
            padding-bottom: 50px;
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px;
        }

        a { text-decoration: none; color: inherit; transition: 0.2s; }

        /* --- NAVBAR --- */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .logo img { height: 25px; width: 25px; border-radius: 50%; }
        .contact-btn {
            background-color: var(--accent);
            color: white;
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .contact-btn:hover { opacity: 0.9; }

        /* --- PROFILE HERO --- */
        .profile-hero {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 40px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 4px;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--bg-body);
        }
        .profile-info h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .role-badge {
            display: inline-block;
            background: rgba(0, 162, 255, 0.15);
            color: var(--accent);
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .bio { color: var(--text-dim); max-width: 600px; font-size: 0.95rem; }

        /* --- SECTION HEADERS --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--border);
            margin-bottom: 15px;
            margin-top: 40px;
            padding-bottom: 5px;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            background: var(--border);
            padding: 5px 15px;
            border-radius: 4px 4px 0 0;
            display: inline-block;
        }

        /* --- PORTFOLIO LIST (FORUM STYLE) --- */
        .topic-list { display: flex; flex-direction: column; gap: 2px; }
        
        .topic-row {
            background-color: var(--bg-card);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid transparent;
            cursor: pointer;
        }
        .topic-row:hover {
            background-color: #2b2f35;
            border-left: 4px solid var(--accent);
        }
        .topic-content { display: flex; align-items: center; gap: 15px; flex: 1; }
        .topic-thumb {
            width: 80px;
            height: 45px;
            object-fit: cover;
            border-radius: 3px;
            background: #000;
        }
        .topic-text h3 { font-size: 1rem; color: var(--text-main); font-weight: 600; margin-bottom: 4px;}
        .topic-desc { font-size: 0.85rem; color: var(--text-dim); }
        
        .topic-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 100px;
            gap: 5px;
        }
        .category-tag {
            font-size: 0.7rem;
            background: var(--tag-bg);
            padding: 2px 6px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }
        .color-dot { width: 8px; height: 8px; display: block; }

        /* --- CLIENTS GRID --- */
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .client-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
        }
        .client-card:hover { transform: translateY(-2px); border: 1px solid var(--accent); }
        .client-img { width: 45px; height: 45px; border-radius: 50%; }
        .client-info h4 { font-size: 0.95rem; }
        .client-info span { font-size: 0.8rem; color: var(--text-dim); }

        /* --- MOBILE --- */
        @media (max-width: 600px) {
            .profile-hero { flex-direction: column; text-align: center; align-items: center; }
            .topic-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            .topic-meta { flex-direction: row; width: 100%; justify-content: space-between; margin-top: 5px;}
            .topic-thumb { width: 100%; height: 120px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container nav-inner">
            <div class="logo">
                <img id="nav-img" src="" alt="icon">
                <span id="nav-name">Loading...</span>
            </div>
            <a href="#" id="nav-contact" class="contact-btn">Contact Me</a>
        </div>
    </header>

    <div class="container">
        
        <!-- ABOUT ME -->
        <div class="profile-hero">
            <img id="hero-img" src="" alt="Avatar" class="profile-pic">
            <div class="profile-info">
                <span id="hero-role" class="role-badge">Developer</span>
                <h1 id="hero-name">Name</h1>
                <p id="hero-bio" class="bio">Bio loading...</p>
            </div>
        </div>

        <!-- PORTFOLIO LIST -->
        <div class="section-header">
            <div class="section-title">Projects / Showcases</div>
        </div>
        <div id="project-list" class="topic-list">
            <!-- Projects inject here -->
        </div>

        <!-- CLIENTS -->
        <div class="section-header">
            <div class="section-title">Past Clients</div>
        </div>
        <div id="client-list" class="clients-grid">
            <!-- Clients inject here -->
        </div>

        <br><br><br>
    </div>

    <!-- JAVASCRIPT: EDIT THIS SECTION -->
    <script>
        // ==========================================
        //         1. CONFIGURATION (EDIT ME!)
        // ==========================================
        
        const myData = {
            name: "DevUsername",
            role: "Scripter & UI Designer",
            bio: "High-quality scripting and interface design. 4+ years of experience on Roblox. I specialize in datastores, combat systems, and clean UI.",
            avatar: "https://tr.rbxcdn.com/30c982631a72986423984534f40f0a53/150/150/AvatarHeadshot/Png", // Your Roblox Avatar URL
            contactUrl: "https://discord.com" // Link to your discord or twitter
        };

        const projects = [
            {
                title: "FPS Gun System",
                desc: "A fully replicated gun system with recoil and hit detection.",
                category: "Scripting",
                color: "#00a2ff", // Blue
                image: "https://via.placeholder.com/300x150/111/FFF?text=Gun+System",
                link: "https://roblox.com"
            },
            {
                title: "Cyber City Map",
                desc: "Large scale cyberpunk city optimized for mobile.",
                category: "Building",
                color: "#F68802", // Orange
                image: "https://via.placeholder.com/300x150/111/FFF?text=City+Map",
                link: "https://roblox.com"
            },
            {
                title: "Inventory UI",
                desc: "Drag and drop inventory with stacking and trading.",
                category: "UI Design",
                color: "#bd2c00", // Red
                image: "https://via.placeholder.com/300x150/111/FFF?text=UI+Design",
                link: "https://roblox.com"
            }
        ];

        const clients = [
            {
                name: "Big Games Studio",
                work: "System Architect",
                icon: "https://via.placeholder.com/50/333?text=BG"
            },
            {
                name: "Roleplay Group",
                work: "Map Builder",
                icon: "https://via.placeholder.com/50/333?text=RP"
            },
            {
                name: "Simulator Legends",
                work: "UI Commissioner",
                icon: "https://via.placeholder.com/50/333?text=SL"
            },
            {
                name: "Fashion Famous",
                work: "3D Modeler",
                icon: "https://via.placeholder.com/50/333?text=FF"
            }
        ];

        // ==========================================
        //    2. SYSTEM LOGIC (DON'T TOUCH BELOW)
        // ==========================================

        // Load Profile
        document.getElementById('nav-name').innerText = myData.name;
        document.getElementById('hero-name').innerText = myData.name;
        document.getElementById('hero-role').innerText = myData.role;
        document.getElementById('hero-bio').innerText = myData.bio;
        document.getElementById('nav-img').src = myData.avatar;
        document.getElementById('hero-img').src = myData.avatar;
        document.getElementById('nav-contact').href = myData.contactUrl;

        // Render Projects
        const projContainer = document.getElementById('project-list');
        projects.forEach(p => {
            const html = `
            <a href="${p.link}" target="_blank" class="topic-row">
                <div class="topic-content">
                    <img src="${p.image}" class="topic-thumb" alt="thumb">
                    <div class="topic-text">
                        <h3>${p.title}</h3>
                        <div class="topic-desc">${p.desc}</div>
                    </div>
                </div>
                <div class="topic-meta">
                    <div class="category-tag" style="color:${p.color}">
                        <span class="color-dot" style="background:${p.color}"></span>
                        ${p.category}
                    </div>
                </div>
            </a>`;
            projContainer.innerHTML += html;
        });

        // Render Clients
        const clientContainer = document.getElementById('client-list');
        clients.forEach(c => {
            const html = `
            <div class="client-card">
                <img src="${c.icon}" class="client-img" alt="client">
                <div class="client-info">
                    <h4>${c.name}</h4>
                    <span>${c.work}</span>
                </div>
            </div>`;
            clientContainer.innerHTML += html;
        });

    </script>
</body>
</html>
